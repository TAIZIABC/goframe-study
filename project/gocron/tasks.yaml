# 定时任务配置示例
tasks:
  - name: "打印时间"
    cron: "*/5 * * * * *"      # 每5秒执行一次 (秒 分 时 日 月 周)
    command: "date '+%Y-%m-%d %H:%M:%S'"
    timeout: 10s

  - name: "磁盘检查"
    cron: "0 */1 * * * *"      # 每1分钟执行
    command: "df -h / | tail -1"
    timeout: 30s

  - name: "慢任务测试"
    cron: "*/15 * * * * *"     # 每15秒
    command: "sleep 2 && echo 'done'"
    timeout: 5s
